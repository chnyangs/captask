services:
  captask:
    build: .
    container_name: captask
    restart: unless-stopped
    ports:
      - "${PORT:-3456}:3456"
    volumes:
      # Persist data (sessions, messages, totp, projects.json)
      - captask-data:/app/data
      # Mount your project directories (add more as needed)
      - ${HOME}/project:/projects:rw
    environment:
      - CAPTASK_TOKEN=${CAPTASK_TOKEN:-}
      - CAPTASK_DATA_DIR=/app/data
      - PORT=3456

volumes:
  captask-data:
